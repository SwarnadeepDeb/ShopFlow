name: CI — Frontend

on:
  push:
    branches: [main, develop]
    paths:
      - "frontend/**"
      - ".github/workflows/ci-frontend.yml"
  pull_request:
    branches: [main]
    paths:
      - "frontend/**"

env:
  AWS_REGION: us-east-1
  ECR_REPOSITORY: shopflow/frontend

jobs:
  # ── Lint & Build check ─────────────────────────────────────────────────────
  build-check:
    name: Lint & Build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build React app
        run: npm run build

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: frontend-dist
          path: frontend/dist
          retention-days: 1

  # ── SonarQube ──────────────────────────────────────────────────────────────
  sonarqube:
    name: SonarQube Scan
    runs-on: ubuntu-latest
    needs: build-check

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: SonarQube Scan
        uses: SonarSource/sonarqube-scan-action@master
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: ${{ secrets.SONAR_HOST_URL }}
        with:
          projectBaseDir: frontend

      - name: SonarQube Quality Gate
        uses: SonarSource/sonarqube-quality-gate-action@master
        timeout-minutes: 5
        with:
          scanMetadataReportFile: frontend/.scannerwork/report-task.txt
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: ${{ secrets.SONAR_HOST_URL }}

  # ── Build Docker, Scan & Push ──────────────────────────────────────────────
  build-scan-push:
    name: Build → Trivy Scan → Push
    runs-on: ubuntu-latest
    needs: sonarqube
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build Docker image
        run: |
          IMAGE="${{ steps.login-ecr.outputs.registry }}/${{ env.ECR_REPOSITORY }}"
          docker build -t ${IMAGE}:${{ github.sha }} -t ${IMAGE}:latest frontend/
          echo "IMAGE_URI=${IMAGE}" >> $GITHUB_ENV

      - name: Trivy image scan
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ env.IMAGE_URI }}:${{ github.sha }}
          format: table
          exit-code: "1"
          ignore-unfixed: true
          severity: CRITICAL,HIGH

      - name: Push to ECR
        run: |
          docker push ${{ env.IMAGE_URI }}:${{ github.sha }}
          docker push ${{ env.IMAGE_URI }}:latest

  # ── Update Helm values ─────────────────────────────────────────────────────
  update-helm:
    name: Update Helm Image Tag
    runs-on: ubuntu-latest
    needs: build-scan-push
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GH_PAT }}

      - name: Update frontend image tag
        run: |
          sed -i "s|^  tag:.*|  tag: \"${{ github.sha }}\"|" \
            helm/charts/frontend/values-dev.yaml

      - name: Commit and push
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add helm/charts/frontend/values-dev.yaml
          git diff --staged --quiet && exit 0
          git commit -m "ci(helm): update frontend image tag to ${{ github.sha }} [skip ci]"
          # Multiple services' pipelines push to main in parallel from the same
          # triggering commit, so a plain push here races and loses when another
          # service's update-helm job lands first. Rebase and retry instead of
          # failing outright.
          for i in 1 2 3 4 5; do
            git push && exit 0
            git fetch origin main
            git rebase origin/main
          done
          echo "Failed to push after 5 retries" >&2
          exit 1
