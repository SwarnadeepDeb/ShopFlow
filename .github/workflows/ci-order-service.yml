name: CI — Order Service

on:
  push:
    branches: [main, develop]
    paths:
      - "services/order-service/**"
      - ".github/workflows/ci-order-service.yml"
      - ".github/workflows/reusable-service-ci.yml"
  pull_request:
    branches: [main]
    paths:
      - "services/order-service/**"

jobs:
  ci:
    uses: ./.github/workflows/reusable-service-ci.yml
    with:
      service-name: order-service
      service-dir: services/order-service
      ecr-repository: shopflow/order-service
    secrets: inherit
