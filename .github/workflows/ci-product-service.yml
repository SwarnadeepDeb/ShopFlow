name: CI — Product Service

on:
  push:
    branches: [main, develop]
    paths:
      - "services/product-service/**"
      - ".github/workflows/ci-product-service.yml"
      - ".github/workflows/reusable-service-ci.yml"
  pull_request:
    branches: [main]
    paths:
      - "services/product-service/**"

jobs:
  ci:
    uses: ./.github/workflows/reusable-service-ci.yml
    with:
      service-name: product-service
      service-dir: services/product-service
      ecr-repository: shopflow/product-service
    secrets: inherit
