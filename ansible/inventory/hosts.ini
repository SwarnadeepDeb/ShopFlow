# Static inventory — use for local testing or when AWS dynamic inventory is unavailable
# Replace <IP> values with actual EC2 public IPs after terraform apply

[sonarqube]
sonarqube-server ansible_host=<SONARQUBE_PUBLIC_IP> ansible_user=ubuntu

[ci_servers:children]
sonarqube

[ci_servers:vars]
ansible_ssh_private_key_file=~/.ssh/shopflow-key.pem
ansible_python_interpreter=/usr/bin/python3
