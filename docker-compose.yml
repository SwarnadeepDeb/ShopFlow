version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: shopflow-db
    environment:
      POSTGRES_DB: shopflow
      POSTGRES_USER: shopflow
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql
    networks:
      - shopflow-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U shopflow"]
      interval: 10s
      timeout: 5s
      retries: 5

  user-service:
    build: ./services/user-service
    container_name: user-service
    env_file: ./services/user-service/.env
    ports:
      - "3001:3001"
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - shopflow-network
    restart: unless-stopped

  product-service:
    build: ./services/product-service
    container_name: product-service
    env_file: ./services/product-service/.env
    ports:
      - "3002:3002"
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - shopflow-network
    restart: unless-stopped

  order-service:
    build: ./services/order-service
    container_name: order-service
    env_file: ./services/order-service/.env
    ports:
      - "3003:3003"
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - shopflow-network
    restart: unless-stopped

  notification-service:
    build: ./services/notification-service
    container_name: notification-service
    env_file: ./services/notification-service/.env
    ports:
      - "3004:3004"
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - shopflow-network
    restart: unless-stopped

  api-gateway:
    image: nginx:alpine
    container_name: api-gateway
    ports:
      - "8080:8080"
    volumes:
      - ./api-gateway/nginx.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - user-service
      - product-service
      - order-service
      - notification-service
    networks:
      - shopflow-network
    restart: unless-stopped

  frontend:
    build: ./frontend
    container_name: frontend
    ports:
      - "80:80"
    depends_on:
      - api-gateway
    networks:
      - shopflow-network
    restart: unless-stopped

networks:
  shopflow-network:
    driver: bridge

volumes:
  postgres_data:
