apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: shopflow-root
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: shopflow

  source:
    repoURL: https://github.com/YOUR_ORG/shopflow.git
    targetRevision: main
    path: gitops/argocd/applications

  destination:
    server: https://kubernetes.default.svc
    namespace: argocd

  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
