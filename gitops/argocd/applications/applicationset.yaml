apiVersion: argoproj.io/v1alpha1
kind: ApplicationSet
metadata:
  name: shopflow-services
  namespace: argocd
spec:
  generators:
    - list:
        elements:
          - service: user-service
          - service: product-service
          - service: order-service
          - service: notification-service
          - service: frontend

  template:
    metadata:
      name: "{{service}}"
      namespace: argocd
      finalizers:
        - resources-finalizer.argocd.argoproj.io
    spec:
      project: shopflow

      source:
        repoURL: https://github.com/SwarnadeepDeb/ShopFlow.git
        targetRevision: main
        path: "helm/charts/{{service}}"
        helm:
          valueFiles:
            - values.yaml
            - values-dev.yaml

      destination:
        server: https://kubernetes.default.svc
        namespace: shopflow

      syncPolicy:
        automated:
          prune: true
          selfHeal: true
          allowEmpty: false
        syncOptions:
          - CreateNamespace=true
          - PrunePropagationPolicy=foreground
          - PruneLast=true
        retry:
          limit: 3
          backoff:
            duration: 10s
            factor: 2
            maxDuration: 3m

      revisionHistoryLimit: 5
