# Example: how Vault Agent Injector injects secrets into a pod at runtime
# The Helm chart's serviceaccount.yaml + this annotation pattern replaces
# the Secret resource in production — no secrets ever live in Git or K8s Secrets.
#
# This is shown as an example patch. In practice these annotations live
# in the Helm chart's deployment.yaml values when vault.enabled=true.

apiVersion: apps/v1
kind: Deployment
metadata:
  name: user-service
  namespace: shopflow
spec:
  template:
    metadata:
      annotations:
        # Enable Vault Agent sidecar injection
        vault.hashicorp.com/agent-inject: "true"

        # The Vault role bound to this pod's ServiceAccount
        vault.hashicorp.com/role: "user-service"

        # Inject secret at /vault/secrets/config.env
        vault.hashicorp.com/agent-inject-secret-config: "secret/data/shopflow/user-service"

        # Render the secret as shell exports
        vault.hashicorp.com/agent-inject-template-config: |
          {{- with secret "secret/data/shopflow/user-service" -}}
          export DB_PASSWORD="{{ .Data.data.db_password }}"
          export JWT_SECRET="{{ .Data.data.jwt_secret }}"
          {{- end }}

        # Pre-populate secrets before the app container starts
        vault.hashicorp.com/agent-init-first: "true"

        # Auto-renew lease — re-injects on rotation without pod restart
        vault.hashicorp.com/agent-inject-command-config: "sh -c 'kill -HUP 1'"

    spec:
      serviceAccountName: user-service   # must match Vault role binding
      containers:
        - name: user-service
          image: user-service:latest
          command: ["/bin/sh", "-c"]
          args:
            - |
              source /vault/secrets/config.env
              node src/server.js
