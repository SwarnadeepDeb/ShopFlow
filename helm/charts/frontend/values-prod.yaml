replicaCount: 2
image:
  tag: "v1.0.0"
ingress:
  enabled: true
  annotations:
    alb.ingress.kubernetes.io/listen-ports: '[{"HTTP": 80}, {"HTTPS": 443}]'
    alb.ingress.kubernetes.io/ssl-redirect: "443"
    alb.ingress.kubernetes.io/certificate-arn: "ACM_CERTIFICATE_ARN"
  hosts:
    - host: shopflow.example.com
      paths:
        - path: /
          pathType: Prefix
hpa:
  enabled: true
  minReplicas: 2
  maxReplicas: 6
resources:
  requests:
    cpu: 100m
    memory: 64Mi
  limits:
    cpu: 300m
    memory: 256Mi
