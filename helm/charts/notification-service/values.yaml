replicaCount: 1

image:
  repository: 879717844084.dkr.ecr.us-east-1.amazonaws.com/shopflow/notification-service
  tag: latest
  pullPolicy: IfNotPresent

service:
  type: ClusterIP
  port: 3004

ingress:
  enabled: false
  annotations: {}
  hosts:
    - host: shopflow.example.com
      paths:
        - path: /api/notifications
          pathType: Prefix

config:
  PORT: "3004"
  DB_HOST: "shopflow-dev-postgres.cifsu6igghrp.us-east-1.rds.amazonaws.com"
  DB_PORT: "5432"
  DB_NAME: "shopflow"
  DB_USER: "shopflow"
  NODE_ENV: "production"

secret:
  DB_PASSWORD: "swarnadeepterraform!879717844084"

resources:
  requests:
    cpu: 100m
    memory: 128Mi
  limits:
    cpu: 500m
    memory: 512Mi

hpa:
  enabled: true
  minReplicas: 1
  maxReplicas: 5
  targetCPUUtilizationPercentage: 70
  targetMemoryUtilizationPercentage: 80

probes:
  liveness:
    path: /health
    initialDelaySeconds: 30
    periodSeconds: 10
  readiness:
    path: /health
    initialDelaySeconds: 10
    periodSeconds: 5

serviceAccount:
  create: true
  name: ""
  annotations: {}

serviceMonitor:
  enabled: true
  interval: "30s"
  scrapeTimeout: "10s"

fullnameOverride: ""
