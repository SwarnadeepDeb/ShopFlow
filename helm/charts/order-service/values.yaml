replicaCount: 1

image:
  repository: ACCOUNT_ID.dkr.ecr.us-east-1.amazonaws.com/shopflow/order-service
  tag: latest
  pullPolicy: IfNotPresent

service:
  type: ClusterIP
  port: 3003

ingress:
  enabled: false
  annotations: {}
  hosts:
    - host: shopflow.example.com
      paths:
        - path: /api/orders
          pathType: Prefix

config:
  PORT: "3003"
  DB_HOST: "postgres-host"
  DB_PORT: "5432"
  DB_NAME: "shopflow"
  DB_USER: "shopflow"
  NODE_ENV: "production"

secret:
  DB_PASSWORD: "changeme"

resources:
  requests:
    cpu: 100m
    memory: 128Mi
  limits:
    cpu: 500m
    memory: 512Mi

hpa:
  enabled: true
  minReplicas: 1
  maxReplicas: 5
  targetCPUUtilizationPercentage: 70
  targetMemoryUtilizationPercentage: 80

probes:
  liveness:
    path: /health
    initialDelaySeconds: 30
    periodSeconds: 10
  readiness:
    path: /health
    initialDelaySeconds: 10
    periodSeconds: 5

serviceAccount:
  create: true
  name: ""
  annotations: {}

serviceMonitor:
  enabled: true
  interval: "30s"
  scrapeTimeout: "10s"

fullnameOverride: ""
