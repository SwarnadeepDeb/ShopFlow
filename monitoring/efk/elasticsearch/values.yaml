## Elasticsearch Helm values — dev
## https://github.com/elastic/helm-charts/tree/main/elasticsearch

clusterName: shopflow-logs
nodeGroup: master

## Single-node for dev; set to 3 in prod
replicas: 1
minimumMasterNodes: 1

## Disable TLS for dev simplicity (enable in prod)
protocol: http
esConfig:
  elasticsearch.yml: |
    xpack.security.enabled: false
    xpack.security.transport.ssl.enabled: false
    cluster.name: shopflow-logs
    network.host: 0.0.0.0

## Resources
resources:
  requests:
    cpu: 500m
    memory: 1Gi
  limits:
    cpu: 1000m
    memory: 2Gi

## JVM heap — set to half of memory limit
esJavaOpts: "-Xmx1g -Xms1g"

## Persistence
volumeClaimTemplate:
  accessModes: ["ReadWriteOnce"]
  storageClassName: gp2
  resources:
    requests:
      storage: 30Gi

## Health checks
readinessProbe:
  failureThreshold: 10
  initialDelaySeconds: 30
  periodSeconds: 10
  successThreshold: 3
  timeoutSeconds: 5

## Anti-affinity relaxed for single-node dev
antiAffinity: "soft"

## Image
imageTag: "8.11.1"

## Pod disruption budget
maxUnavailable: 1
