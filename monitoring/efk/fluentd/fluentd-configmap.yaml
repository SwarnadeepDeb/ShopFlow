apiVersion: v1
kind: ConfigMap
metadata:
  name: fluentd-config
  namespace: logging
data:
  fluent.conf: |
    ## ── Input: tail all container logs ────────────────────────────────────────
    <source>
      @type tail
      @id in_tail_container_logs
      path /var/log/containers/*.log
      pos_file /var/log/fluentd-containers.log.pos
      tag kubernetes.*
      read_from_head true
      <parse>
        @type multi_format
        <pattern>
          format json
          time_key time
          time_format %Y-%m-%dT%H:%M:%S.%NZ
        </pattern>
        <pattern>
          format /^(?<time>.+) (?<stream>stdout|stderr) [^ ]* (?<log>.*)$/
          time_format %Y-%m-%dT%H:%M:%S.%N%:z
        </pattern>
      </parse>
    </source>

    ## ── Filter: enrich with Kubernetes metadata ───────────────────────────────
    <filter kubernetes.**>
      @type kubernetes_metadata
      @id filter_kube_metadata
      kubernetes_url "#{ENV['KUBERNETES_SERVICE_HOST']}:#{ENV['KUBERNETES_SERVICE_PORT']}"
      skip_labels false
      skip_container_metadata false
      skip_master_url false
      skip_namespace_metadata false
    </filter>

    ## ── Filter: parse JSON logs from Node.js services ─────────────────────────
    <filter kubernetes.var.log.containers.**shopflow**>
      @type parser
      key_name log
      reserve_data true
      remove_key_name_field true
      emit_invalid_record_to_error false
      <parse>
        @type json
        time_key timestamp
        time_format %Y-%m-%dT%H:%M:%S.%LZ
        keep_time_key true
      </parse>
    </filter>

    ## ── Filter: add shopflow label for namespace filtering ────────────────────
    <filter kubernetes.**>
      @type record_transformer
      <record>
        cluster_name shopflow
        environment "#{ENV['ENVIRONMENT'] || 'dev'}"
      </record>
    </filter>

    ## ── Filter: drop health check noise ──────────────────────────────────────
    <filter kubernetes.**>
      @type grep
      <exclude>
        key $.kubernetes.container_name
        pattern /fluentd|prometheus|alertmanager/
      </exclude>
    </filter>

    <filter kubernetes.**>
      @type grep
      <exclude>
        key log
        pattern /"GET \/health/
      </exclude>
    </filter>

    ## ── Output: Elasticsearch ─────────────────────────────────────────────────
    <match kubernetes.**>
      @type elasticsearch
      @id out_es
      @log_level info

      host "#{ENV['FLUENT_ELASTICSEARCH_HOST']}"
      port "#{ENV['FLUENT_ELASTICSEARCH_PORT']}"
      scheme "#{ENV['FLUENT_ELASTICSEARCH_SCHEME']}"
      ssl_verify "#{ENV['FLUENT_ELASTICSEARCH_SSL_VERIFY']}"

      index_name "#{ENV['FLUENT_ELASTICSEARCH_INDEX_NAME']}"

      ## Use data stream format for ILM support
      logstash_format true
      logstash_prefix shopflow
      logstash_dateformat %Y.%m.%d

      include_tag_key true
      tag_key @log_name

      ## Buffering
      <buffer>
        @type file
        path /var/log/fluentd-buffers/kubernetes.system.buffer
        flush_mode interval
        retry_type exponential_backoff
        flush_thread_count 2
        flush_interval 5s
        retry_forever true
        retry_max_interval 30
        chunk_limit_size 2M
        total_limit_size 500M
        overflow_action block
      </buffer>
    </match>

    ## ── Output: Prometheus metrics (fluentd self-monitoring) ──────────────────
    <source>
      @type prometheus
      bind 0.0.0.0
      port 24231
      metrics_path /metrics
    </source>

    <source>
      @type prometheus_output_monitor
      interval 10
    </source>
