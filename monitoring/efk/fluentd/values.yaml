## Fluentd Helm values
## https://github.com/fluent/helm-charts/tree/main/charts/fluentd

## Run as DaemonSet to collect logs from every node
kind: DaemonSet

image:
  repository: fluent/fluentd-kubernetes-daemonset
  tag: v1.16-debian-elasticsearch8-1

## Mount host log directories
volumes:
  - name: varlog
    hostPath:
      path: /var/log
  - name: varlibdockercontainers
    hostPath:
      path: /var/lib/docker/containers
  - name: fluentd-config
    configMap:
      name: fluentd-config

volumeMounts:
  - name: varlog
    mountPath: /var/log
  - name: varlibdockercontainers
    mountPath: /var/lib/docker/containers
    readOnly: true
  - name: fluentd-config
    mountPath: /fluentd/etc/fluent.conf
    subPath: fluent.conf

## ServiceAccount with read access to pods/namespaces
serviceAccount:
  create: true

## RBAC
rbac:
  create: true

## Resources
resources:
  requests:
    cpu: 100m
    memory: 200Mi
  limits:
    cpu: 500m
    memory: 500Mi

## Tolerations to run on all nodes including masters
tolerations:
  - key: node-role.kubernetes.io/control-plane
    operator: Exists
    effect: NoSchedule
  - operator: Exists
    effect: NoExecute
  - operator: Exists
    effect: NoSchedule

## Environment variables for Elasticsearch endpoint
env:
  - name: FLUENT_ELASTICSEARCH_HOST
    value: "elasticsearch-master.logging.svc.cluster.local"
  - name: FLUENT_ELASTICSEARCH_PORT
    value: "9200"
  - name: FLUENT_ELASTICSEARCH_SCHEME
    value: "http"
  - name: FLUENT_ELASTICSEARCH_SSL_VERIFY
    value: "false"
  - name: FLUENT_ELASTICSEARCH_INDEX_NAME
    value: "shopflow-logs"

## Disable default config so we use our own ConfigMap
fileConfigs: {}
