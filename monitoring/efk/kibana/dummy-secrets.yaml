# The kibana chart's pre-install/post-delete hook jobs unconditionally mount a
# Secret named by elasticsearchCertificateSecret — there's no template guard to
# skip it even when Elasticsearch runs plain HTTP (createCert: false upstream).
# This dummy secret exists purely to satisfy that mount; its contents are never
# read since Kibana talks to Elasticsearch over http://, not https://.
apiVersion: v1
kind: Secret
metadata:
  name: kibana-dummy-certs
  namespace: logging
type: Opaque
stringData:
  ca.crt: "unused-dev-placeholder"
---
# The Deployment's ELASTICSEARCH_SERVICEACCOUNTTOKEN env var mandatorily reads
# this secret (optional: false) with no way to disable via values — it's
# normally created by the pre-install token-creation job, which we skip
# (--no-hooks) because its manage-es-token.js hardcodes https and can never
# work against a plain-HTTP Elasticsearch. The token value itself is unused
# since xpack.security.enabled: false means ES never checks it.
apiVersion: v1
kind: Secret
metadata:
  name: kibana-kibana-es-token
  namespace: logging
type: Opaque
stringData:
  token: "unused-dev-placeholder"
