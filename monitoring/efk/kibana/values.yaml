## Kibana Helm values — dev
## https://github.com/elastic/helm-charts/tree/main/charts/kibana

imageTag: "8.11.1"

elasticsearchHosts: "http://shopflow-logs-master.logging.svc.cluster.local:9200"

## The chart's pre-install/post-delete hook jobs mount this secret
## unconditionally (no template guard, even though Elasticsearch runs plain
## HTTP with createCert: false upstream) — points at a dummy secret applied
## separately via dummy-secrets.yaml; its contents are never read.
elasticsearchCertificateSecret: kibana-dummy-certs

## Chart defaults to "elasticsearch-master-credentials", but our ES cluster
## uses clusterName/nodeGroup (shopflow-logs/master), which changes both the
## service name and generated secret name to the shopflow-logs-master- prefix.
elasticsearchCredentialSecret: shopflow-logs-master-credentials

replicas: 1

resources:
  requests:
    cpu: 500m
    memory: 1Gi
  limits:
    cpu: 1000m
    memory: 2Gi

## Disable security for dev
kibanaConfig:
  kibana.yml: |
    server.host: "0.0.0.0"
    elasticsearch.hosts: ["http://shopflow-logs-master.logging.svc.cluster.local:9200"]
    xpack.security.enabled: false
    xpack.encryptedSavedObjects.encryptionKey: "shopflow-kibana-encryption-key-32c"
    ## Increase timeout for large queries
    elasticsearch.requestTimeout: 90000

## Health checks
readinessProbe:
  failureThreshold: 10
  initialDelaySeconds: 60
  periodSeconds: 10
  successThreshold: 3
  timeoutSeconds: 5

service:
  type: ClusterIP
  port: 5601
