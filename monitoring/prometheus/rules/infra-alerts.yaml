apiVersion: monitoring.coreos.com/v1
kind: PrometheusRule
metadata:
  name: shopflow-infra-alerts
  namespace: monitoring
  labels:
    release: kube-prometheus-stack
spec:
  groups:
    ## ── Node CPU ────────────────────────────────────────────────────────────
    - name: infra.node_cpu
      rules:
        - alert: NodeHighCPU
          expr: |
            (
              1 - avg(rate(node_cpu_seconds_total{mode="idle"}[5m])) by (instance)
            ) * 100 > 80
          for: 10m
          labels:
            severity: warning
            team: infra
          annotations:
            summary: "High CPU on node {{ $labels.instance }}"
            description: "Node {{ $labels.instance }} CPU usage is {{ $value | humanize }}% (threshold: 80%) for 10 minutes."

        - alert: NodeCriticalCPU
          expr: |
            (
              1 - avg(rate(node_cpu_seconds_total{mode="idle"}[5m])) by (instance)
            ) * 100 > 95
          for: 5m
          labels:
            severity: critical
            team: infra
          annotations:
            summary: "CRITICAL CPU on node {{ $labels.instance }}"
            description: "Node {{ $labels.instance }} CPU usage is {{ $value | humanize }}% (threshold: 95%) for 5 minutes."

    ## ── Node Memory ─────────────────────────────────────────────────────────
    - name: infra.node_memory
      rules:
        - alert: NodeHighMemory
          expr: |
            (
              1 - (
                node_memory_MemAvailable_bytes / node_memory_MemTotal_bytes
              )
            ) * 100 > 80
          for: 10m
          labels:
            severity: warning
            team: infra
          annotations:
            summary: "High memory on node {{ $labels.instance }}"
            description: "Node {{ $labels.instance }} memory usage is {{ $value | humanize }}% (threshold: 80%)."

        - alert: NodeCriticalMemory
          expr: |
            (
              1 - (
                node_memory_MemAvailable_bytes / node_memory_MemTotal_bytes
              )
            ) * 100 > 95
          for: 5m
          labels:
            severity: critical
            team: infra
          annotations:
            summary: "CRITICAL memory on node {{ $labels.instance }}"
            description: "Node {{ $labels.instance }} memory usage is {{ $value | humanize }}% (threshold: 95%)."

    ## ── Node Disk ───────────────────────────────────────────────────────────
    - name: infra.node_disk
      rules:
        - alert: NodeDiskSpaceLow
          expr: |
            (
              1 - (
                node_filesystem_avail_bytes{fstype!~"tmpfs|overlay|squashfs"}
                / node_filesystem_size_bytes{fstype!~"tmpfs|overlay|squashfs"}
              )
            ) * 100 > 75
          for: 15m
          labels:
            severity: warning
            team: infra
          annotations:
            summary: "Low disk on {{ $labels.instance }}:{{ $labels.mountpoint }}"
            description: "Disk usage at {{ $value | humanize }}% (threshold: 75%)."

        - alert: NodeDiskSpaceCritical
          expr: |
            (
              1 - (
                node_filesystem_avail_bytes{fstype!~"tmpfs|overlay|squashfs"}
                / node_filesystem_size_bytes{fstype!~"tmpfs|overlay|squashfs"}
              )
            ) * 100 > 90
          for: 5m
          labels:
            severity: critical
            team: infra
          annotations:
            summary: "CRITICAL disk on {{ $labels.instance }}:{{ $labels.mountpoint }}"
            description: "Disk usage at {{ $value | humanize }}% (threshold: 90%). Immediate action required."

        - alert: NodeDiskReadLatencyHigh
          expr: |
            rate(node_disk_read_time_seconds_total[5m])
            / rate(node_disk_reads_completed_total[5m]) > 0.1
          for: 10m
          labels:
            severity: warning
            team: infra
          annotations:
            summary: "High disk read latency on {{ $labels.instance }}"
            description: "Disk read latency {{ $value | humanizeDuration }} on {{ $labels.device }}."

    ## ── Kubernetes Pods ─────────────────────────────────────────────────────
    - name: infra.kubernetes
      rules:
        - alert: PodCrashLooping
          expr: |
            rate(kube_pod_container_status_restarts_total[15m]) * 60 * 15 > 0
          for: 5m
          labels:
            severity: warning
            team: infra
          annotations:
            summary: "Pod {{ $labels.pod }} is crash-looping"
            description: "Pod {{ $labels.namespace }}/{{ $labels.pod }} container {{ $labels.container }} has restarted {{ $value | humanize }} times in 15 minutes."

        - alert: PodOOMKilled
          expr: |
            kube_pod_container_status_last_terminated_reason{reason="OOMKilled"} == 1
          for: 0m
          labels:
            severity: warning
            team: infra
          annotations:
            summary: "Pod {{ $labels.pod }} OOM killed"
            description: "Container {{ $labels.container }} in {{ $labels.namespace }}/{{ $labels.pod }} was OOM killed."

        - alert: PVCNearFull
          expr: |
            (
              kubelet_volume_stats_used_bytes
              / kubelet_volume_stats_capacity_bytes
            ) * 100 > 85
          for: 15m
          labels:
            severity: warning
            team: infra
          annotations:
            summary: "PVC {{ $labels.persistentvolumeclaim }} nearly full"
            description: "PVC {{ $labels.persistentvolumeclaim }} in {{ $labels.namespace }} is {{ $value | humanize }}% full."
