## kube-prometheus-stack values — dev/staging
## https://github.com/prometheus-community/helm-charts/tree/main/charts/kube-prometheus-stack

fullnameOverride: kube-prometheus-stack

## ── Prometheus ────────────────────────────────────────────────────────────────
prometheus:
  prometheusSpec:
    retention: 15d
    retentionSize: "10GB"

    resources:
      requests:
        cpu: 200m
        memory: 512Mi
      limits:
        cpu: 500m
        memory: 1Gi

    storageSpec:
      volumeClaimTemplate:
        spec:
          storageClassName: gp2
          accessModes: ["ReadWriteOnce"]
          resources:
            requests:
              storage: 20Gi

    ## Scrape all ServiceMonitors/PodMonitors across namespaces
    serviceMonitorSelectorNilUsesHelmValues: false
    podMonitorSelectorNilUsesHelmValues: false
    ruleSelectorNilUsesHelmValues: false

    ## Additional scrape configs for services that don't have ServiceMonitors
    additionalScrapeConfigs: []

  service:
    type: ClusterIP

## ── AlertManager ──────────────────────────────────────────────────────────────
alertmanager:
  alertmanagerSpec:
    resources:
      requests:
        cpu: 50m
        memory: 64Mi
      limits:
        cpu: 100m
        memory: 128Mi

    storage:
      volumeClaimTemplate:
        spec:
          storageClassName: gp2
          accessModes: ["ReadWriteOnce"]
          resources:
            requests:
              storage: 5Gi

  config:
    global:
      resolve_timeout: 5m
      slack_api_url: "https://hooks.slack.com/services/REPLACE/WITH/YOUR_WEBHOOK"

    route:
      group_by: ['alertname', 'namespace', 'service']
      group_wait: 30s
      group_interval: 5m
      repeat_interval: 4h
      receiver: 'slack-notifications'
      routes:
        - matchers:
            - severity = "critical"
          receiver: 'slack-critical'
          repeat_interval: 1h
        - matchers:
            - severity = "warning"
          receiver: 'slack-notifications'

    receivers:
      - name: 'slack-notifications'
        slack_configs:
          - channel: '#shopflow-alerts'
            send_resolved: true
            title: '[{{ .Status | toUpper }}{{ if eq .Status "firing" }}:{{ .Alerts.Firing | len }}{{ end }}] ShopFlow Alert'
            text: >-
              {{ range .Alerts }}
              *Alert:* {{ .Annotations.summary }}
              *Details:* {{ .Annotations.description }}
              *Severity:* {{ .Labels.severity }}
              *Namespace:* {{ .Labels.namespace }}
              {{ end }}

      - name: 'slack-critical'
        slack_configs:
          - channel: '#shopflow-critical'
            send_resolved: true
            title: ':rotating_light: CRITICAL: {{ .GroupLabels.alertname }}'
            text: >-
              {{ range .Alerts }}
              *Alert:* {{ .Annotations.summary }}
              *Details:* {{ .Annotations.description }}
              *Namespace:* {{ .Labels.namespace }}
              {{ end }}

    inhibit_rules:
      - source_matchers:
          - severity = "critical"
        target_matchers:
          - severity = "warning"
        equal: ['alertname', 'namespace', 'service']

## ── Grafana ───────────────────────────────────────────────────────────────────
grafana:
  enabled: true
  adminPassword: "ShopFlow@Grafana2024!"

  resources:
    requests:
      cpu: 100m
      memory: 128Mi
    limits:
      cpu: 200m
      memory: 256Mi

  persistence:
    enabled: true
    storageClassName: gp2
    size: 5Gi

  ## Load custom dashboards from ConfigMaps
  sidecar:
    dashboards:
      enabled: true
      searchNamespace: ALL
      label: grafana_dashboard
      labelValue: "1"
    datasources:
      enabled: true

  ## Extra datasources — Jaeger for trace correlation
  additionalDataSources:
    - name: Jaeger
      type: jaeger
      url: http://jaeger-query.tracing.svc.cluster.local:16686
      access: proxy
      isDefault: false

  grafana.ini:
    server:
      root_url: "%(protocol)s://%(domain)s:%(http_port)s/"
    analytics:
      reporting_enabled: false
    security:
      allow_embedding: true

## ── Node Exporter ─────────────────────────────────────────────────────────────
nodeExporter:
  enabled: true

## ── Kube State Metrics ────────────────────────────────────────────────────────
kubeStateMetrics:
  enabled: true

## ── Default PrometheusRules ───────────────────────────────────────────────────
defaultRules:
  create: true
  rules:
    alertmanager: true
    etcd: false        # etcd not accessible in EKS managed control plane
    configReloaders: true
    general: true
    k8sContainerCpuUsageSecondsTotal: true
    k8sContainerMemoryCache: true
    k8sContainerMemoryRss: true
    k8sContainerMemorySwap: true
    k8sPodOwner: true
    kubeApiserverAvailability: true
    kubeApiserverBurnrate: true
    kubeApiserverHistogram: true
    kubeApiserverSlos: true
    kubeControllerManager: false  # not accessible in EKS
    kubelet: true
    kubeProxy: false              # not accessible in EKS
    kubePrometheusGeneral: true
    kubePrometheusNodeRecording: true
    kubernetesApps: true
    kubernetesResources: true
    kubernetesStorage: true
    kubernetesSystem: true
    kubeSchedulerAlerting: false  # not accessible in EKS
    kubeSchedulerRecording: false
    kubeStateMetrics: true
    network: true
    node: true
    nodeExporterAlerting: true
    nodeExporterRecording: true
    prometheus: true
    prometheusOperator: true
